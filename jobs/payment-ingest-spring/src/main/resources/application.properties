# payment-ingest-spring - application configuration
#
# All S3 and Postgres settings live here so this service can be pointed at
# any bucket/database without code changes. Override any of these via
# environment variables (Spring relaxed binding, e.g. PAYMENT_INGEST_S3_BUCKET,
# SPRING_DATASOURCE_URL) or a profile-specific application-<profile>.properties.

spring.application.name=payment-ingest-spring

# ── Payment source ───────────────────────────────────────────────────────
# "s3" (default) polls the S3 bucket configured below.
# "filesystem" watches a local directory instead - no AWS/S3 dependency,
# useful for running/demoing the service locally against just Postgres.
payment-ingest.source=filesystem

# ── Postgres datasource ──────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/payments
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# ── Liquibase ────────────────────────────────────────────────────────────
# Default changelog location Spring Boot looks for - explicit here for clarity.
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml
spring.liquibase.enabled=true

# ── S3 polling ───────────────────────────────────────────────────────────
# Bucket to poll for new payment XML files.
payment-ingest.s3.bucket=CHANGE_ME_payment-files-bucket
# AWS region for the S3 client.
payment-ingest.s3.region=us-west-2
# Key prefix under which pacs.008 files are dropped.
payment-ingest.s3.payments-prefix=payments/
# Key prefix for optional reference data (bic_directory.json, watchlist.json,
# closed_accounts.json). Leave blank to disable those specific error checks.
payment-ingest.s3.reference-data-prefix=reference/
# How often (ms) to poll the bucket for new files.
payment-ingest.s3.poll-interval-ms=15000
# Optional: point the S3 client at a custom endpoint (e.g. LocalStack/MinIO)
# for local development. Leave blank to use real AWS S3.
payment-ingest.s3.endpoint-override=

# ── Local-filesystem polling (only used when payment-ingest.source=filesystem) ──
# Root directory to watch. Under it, pacs.008 *.xml files go in
# <watch-dir>/payments/ and optional reference-data JSON files
# (bic_directory.json, watchlist.json, closed_accounts.json) go in
# <watch-dir>/reference/.
payment-ingest.filesystem.watch-dir=C:/Users/u727254/IdeaProjects/vista-hackathon-26_A/local-payment-drop
payment-ingest.filesystem.payments-subdir=payments
payment-ingest.filesystem.reference-data-subdir=reference
payment-ingest.filesystem.poll-interval-ms=5000

# ── Error-resolution agent (Claude Sonnet via AWS Bedrock) ────────────────
# Knowledge base (detection + suggested_action per error code, given as
# reference context to the model). Bundled copy is used by default; point
# this at an external file:... path to override without a rebuild, e.g.:
# payment-ingest.error-agent.knowledge-base-path=file:C:/Users/u727254/Desktop/VISTA - hack/error-list/agent_error_knowledge.yaml
payment-ingest.error-agent.knowledge-base-path=classpath:error-knowledge/agent_error_knowledge.yaml
# System prompt for the resolution agent.
payment-ingest.error-agent.system-prompt-path=classpath:prompts/error_resolution_system_prompt.md
# Bedrock model id (or region-prefixed inference profile id) for Claude Sonnet.
payment-ingest.error-agent.model-id=anthropic.claude-sonnet-4-6-v1:0
# AWS region for the Bedrock Runtime client.
payment-ingest.error-agent.bedrock-region=us-west-2
payment-ingest.error-agent.max-tokens=1024
payment-ingest.error-agent.temperature=0.1
# Where the agent appends its suggested-resolution write-up for each payment
# that has one or more detected errors. Swap the ResolutionSink bean to
# route this elsewhere later (queue, API, DB table) instead of a file.
payment-ingest.error-agent.resolution-log-path=logs/error_resolution.log

# ── Logging ──────────────────────────────────────────────────────────────
logging.level.com.payinvestigator.ingest=INFO
