# payment-ingest-spring - application configuration
#
# All S3 and Postgres settings live here so this service can be pointed at
# any bucket/database without code changes. Override any of these via
# environment variables (Spring relaxed binding, e.g. PAYMENT_INGEST_S3_BUCKET,
# SPRING_DATASOURCE_URL) or a profile-specific application-<profile>.properties.

spring.application.name=payment-ingest-spring

# ── Postgres datasource ──────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/payments
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# ── Liquibase ────────────────────────────────────────────────────────────
# Default changelog location Spring Boot looks for - explicit here for clarity.
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml
spring.liquibase.enabled=true

# ── S3 polling ───────────────────────────────────────────────────────────
# Bucket to poll for new payment XML files.
payment-ingest.s3.bucket=CHANGE_ME_payment-files-bucket
# AWS region for the S3 client.
payment-ingest.s3.region=us-west-2
# Key prefix under which pacs.008 files are dropped.
payment-ingest.s3.payments-prefix=payments/
# Key prefix for optional reference data (bic_directory.json, watchlist.json,
# closed_accounts.json). Leave blank to disable those specific error checks.
payment-ingest.s3.reference-data-prefix=reference/
# How often (ms) to poll the bucket for new files.
payment-ingest.s3.poll-interval-ms=15000
# Optional: point the S3 client at a custom endpoint (e.g. LocalStack/MinIO)
# for local development. Leave blank to use real AWS S3.
payment-ingest.s3.endpoint-override=

# ── Logging ──────────────────────────────────────────────────────────────
logging.level.com.payinvestigator.ingest=INFO
