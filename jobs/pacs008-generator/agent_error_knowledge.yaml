# Error knowledge base for the AI analysis agent (Use Case A)
# Counterpart of error_catalog.yaml (generator): same codes, but from the
# DETECTION perspective - where to check, how to check, what to do.
# Ground truth for benchmarking is delivered in the generator's manifest.json.
version: 1.1
scope: "SWIFT CBPR+ pacs.008.001.08 (SR2025), business errors only (XML is XSD-valid)"
reference_data_needed:
  iban_registry: "IBAN lengths per country (ISO 13616) - static, see pacs008_generator/iban_validator.py"
  iso_country_list: "ISO 3166 country codes - static"
  uetr_history: "Previously processed UETRs (demo: all messages of the batch)"

errors:
  - code: IBAN_INVALID_CHECKSUM
    title: "IBAN check digits invalid"
    category: account_identifier
    severity: high
    check_fields: ["CdtTrfTxInf/CdtrAcct/Id/IBAN"]
    detection: "Mod-97 check per ISO 7064: rearrange IBAN (BBAN + country code + check digits), expand alphanumerics to digits, remainder must be 1."
    reference_data: []
    investigation_type: "UTAP (Unable to Apply)"
    suggested_action: "Repair: request correct IBAN from originator/DbtrAgt; no auto-fix possible (original unknown)."
    auto_repairable: false

  - code: IBAN_WRONG_LENGTH
    title: "IBAN length wrong for country code"
    category: account_identifier
    severity: high
    check_fields: ["CdtTrfTxInf/CdtrAcct/Id/IBAN"]
    detection: "Compare IBAN length against country-specific target length (DE=22, FR=27, GB=22, CH=21, NL=18, ...)."
    reference_data: ["iban_registry"]
    investigation_type: "UTAP"
    suggested_action: "Repair: request IBAN again; usually a typo or truncated capture."
    auto_repairable: false

  - code: BIC_IBAN_COUNTRY_MISMATCH
    title: "BIC/IBAN country mismatch"
    category: account_identifier
    severity: high
    check_fields: ["CdtTrfTxInf/CdtrAgt/FinInstnId/BICFI", "CdtTrfTxInf/CdtrAcct/Id/IBAN"]
    detection: "Compare BIC positions 5-6 (country code) with IBAN positions 1-2; deviation = mismatch. Note: legitimate exceptions possible (e.g. branch BICs) -> flag as suspicion."
    reference_data: []
    investigation_type: "UTAP / routing clarification"
    suggested_action: "Check whether CdtrAgt or IBAN is wrong; determine the correct agent institution."
    auto_repairable: partially

  - code: BIC_INVALID_COUNTRY
    title: "BIC with invalid country code"
    category: routing
    severity: high
    check_fields: ["CdtTrfTxInf/CdtrAgt/FinInstnId/BICFI", "all agent BICs"]
    detection: "Check BIC positions 5-6 against the static ISO 3166 country list - no external directory needed. (Production extension would be an existence check against SWIFTRef.)"
    reference_data: []
    investigation_type: "Routing / possible return"
    suggested_action: "Determine the correct BIC; the BIC is obviously corrupted or mis-captured."
    auto_repairable: partially

  - code: BENEFICIARY_NAME_INCOMPLETE
    title: "Beneficiary name incomplete"
    category: beneficiary_data
    severity: medium
    check_fields: ["CdtTrfTxInf/Cdtr/Nm"]
    detection: "Heuristic: length < 5, initials only (pattern '^[A-Z]\\.$'), single token, generic placeholders (UNKNOWN, N/A)."
    reference_data: []
    investigation_type: "UTAP (strongest demo case)"
    suggested_action: "camt.110 RQST/UTAP to DbtrAgt: request the full name; name-account matching at the CdtrAgt will fail otherwise."
    auto_repairable: false

  - code: ADDRESS_INCOMPLETE
    title: "Beneficiary address incomplete"
    category: beneficiary_data
    severity: medium
    check_fields: ["CdtTrfTxInf/Cdtr/PstlAdr"]
    detection: "PstlAdr contains only Ctry (no TwnNm/StrtNm/AdrLine) - violates CBPR+ expectation of town + country; stricter from SR2026."
    reference_data: []
    investigation_type: "RQFI (compliance) / UTAP"
    suggested_action: "Request the complete structured address (FATF Recommendation 16 / Travel Rule)."
    auto_repairable: false

  - code: DUPLICATE_UETR
    title: "Duplicate UETR (possible duplicate payment)"
    category: duplicate
    severity: high
    check_fields: ["CdtTrfTxInf/PmtId/UETR"]
    detection: "Check UETR against the history of already processed messages; hit = possible duplicate processing. In the demo the history is the delivered batch itself."
    reference_data: ["uetr_history"]
    investigation_type: "Duplicate clarification / possibly recall camt.056"
    suggested_action: "Hold the payment, compare with the original (amount/parties identical? -> true duplicate, recall); never reuse a UETR."
    auto_repairable: false

  - code: XCHG_RATE_INCONSISTENT
    title: "InstdAmt/XchgRate inconsistent"
    category: fx
    severity: medium
    check_fields: ["CdtTrfTxInf/InstdAmt", "CdtTrfTxInf/XchgRate", "CdtTrfTxInf/IntrBkSttlmAmt"]
    detection: "If InstdAmt currency != IntrBkSttlmAmt currency: |InstdAmt * XchgRate - IntrBkSttlmAmt| / IntrBkSttlmAmt > tolerance (e.g. 1%) = inconsistent."
    reference_data: []
    investigation_type: "Clarification with instructing agent"
    suggested_action: "Clarify the correct rate/amount; consider rounding rules and rate date."
    auto_repairable: partially

# Note for the agent: messages could in theory carry several errors
# (the generator currently injects exactly one per faulty message).
# Recommended analysis output per message:
# [{code, confidence, evidence(fields+values), suggested_action}]
