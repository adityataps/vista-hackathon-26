# SPA config — /api/* is routed to the backend by the ALB in production,
# so nginx only serves the static build with history-API fallback.
server {
  listen 80;
  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }

  location /healthz {
    return 200 'ok';
    add_header Content-Type text/plain;
  }
}
